<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TSP Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #2b2b2b; height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="container" style="max-width: 450px;">
        <div class="text-center mb-4">
            <h1 class="fw-bold display-6">Admin Access</h1>
            <p class="text-muted">Enter password to manage submissions</p>
        </div>

        <div class="card p-4 p-md-5">
            {% if error %}
            <div class="alert alert-danger py-2 text-center small fw-bold" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold text-uppercase">Admin Password</label>
                    <input type="password" class="form-control form-control-lg bg-light" name="password" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="/" class="text-decoration-none small text-muted">← Back to Leaderboard</a>
            </div>
        </div>
    </div>

</body>
</html>
